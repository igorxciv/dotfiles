# --- Background ---
background_opacity 0.9
dynamic_background_opacity yes

# --- Cursor ---
cursor_shape          block
cursor_blink_interval 0

# --- Scrollback ---
scrollback_lines 10000

# --- Mouse & selection ---
copy_on_select  yes
mouse_hide_wait 3.0

# --- Padding / window chrome ---
window_padding_width    10
hide_window_decorations titlebar-only
window_margin_width     2
confirm_os_window_close 0

# --- Tab bar ---
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted

# --- Powerline tab look ---
# Active tabs
active_tab_foreground #191925
active_tab_background #bda5f0
active_tab_font_style bold
# Inactive tabs
inactive_tab_foreground #8487a0
inactive_tab_background #393a4d
inactive_tab_font_style normal
tab_bar_background      #191925

# --- Custom tab bar ---
tab_bar_style    custom
tab_bar_min_tabs 1


# kitty.conf - loader only. Real config lives in conf.d/ (tracked, ordered),
# os/ (tracked, auto-selected per platform), and local.conf (gitignored)
#
# Reload live after editiing anything: ctrl+shift+f5 (⌃+⌘+, on MacOS)
# Inspect the merged result:           ctrl+shift+f6 (⌥+⌘+, on MacOS)
# auto_reload_config is on by default, so most edits apply on save.

# --- portable modules, load order is explicit on purpose (top wins ties last) ---
include conf.d/00-fonts.conf
include conf.d/10-appearance.conf
include conf.d/20-behavior.conf
include conf.d/30-keymaps.conf
include conf.d/40-tabs-windows.conf

# --- OS-specific, resolved natively, KITTY_OS is linux | macos | bsd. ---
# Env vars expand inside include paths, so this picks the right file per machine
# with zero conditionals and nothing gitignored
include os/${KITTY_OS}.conf

# --- theme, managed by `kitten themes` (writes current-theme.conf) ---
include current-theme.conf

# --- machine-specific overrides, gitignored. LAST so it overrides everything. ---
# Non-fatal is missing; install.sh seeds it from local.conf.example.
include local.conf

